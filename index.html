<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0C0F">
<title>GMS Soluciones Integrales</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0A0C0F;--s1:#121418;--s2:#1A1D24;--s3:#22262F;--s4:#2A2F3A;
  --bord:#252932;--bord2:#323848;
  --tx:#E8ECF2;--tx2:#8A95A8;--tx3:#4A5568;
  --cyan:#E8821A;--cyan-dim:#E8821A22;--cyan-dk:#7A3A00;
  --amber:#2B6CB8;--amber-dim:#2B6CB822;--amber-dk:#0D2E5C;
  --violet:#F5A623;--violet-dim:#F5A62322;--violet-dk:#7A4A00;
  --rose:#E84A1A;--rose-dim:#E84A1A22;--rose-dk:#6A1A00;
  --blue:#2B6CB8;--blue-dim:#2B6CB822;
  --green:#22C55E;--green-dim:#22C55E22;
  --orange:#E8821A;--orange-dim:#E8821A22;
  --r:10px;--rs:6px;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;max-width:480px;margin:0 auto;font-size:14px}

/* HEADER */
.hdr{background:var(--s1);border-bottom:1px solid var(--bord);padding:14px 18px 10px;position:sticky;top:0;z-index:100}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.logo{font-size:19px;font-weight:700;letter-spacing:-0.5px;color:var(--tx)}
.logo em{color:var(--cyan);font-style:normal}
.hdr-sub{font-size:11px;color:var(--tx3);font-family:'JetBrains Mono',monospace}
.hdr-actions{display:flex;gap:8px;align-items:center}
.btn-new{background:var(--orange);color:#fff;border:none;border-radius:var(--rs);padding:8px 14px;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.3px;transition:opacity .15s}
.btn-new:active{opacity:.75}
.btn-notif{background:var(--s3);border:1px solid var(--bord2);border-radius:var(--rs);padding:7px 10px;font-size:14px;cursor:pointer;line-height:1;position:relative}
.notif-dot{position:absolute;top:-3px;right:-3px;width:8px;height:8px;background:var(--rose);border-radius:50%;display:none}
.notif-dot.on{display:block}

/* CLIMA TABS */
.wx-wrap{background:var(--s1);border-bottom:1px solid var(--bord)}
.wx-today{padding:11px 18px;display:flex;gap:12px;align-items:center}
.wx-ico{font-size:24px;flex-shrink:0}
.wx-info{flex:1;min-width:0}
.wx-title{font-size:13px;font-weight:600;color:var(--tx)}
.wx-msg{font-size:11px;margin-top:2px;line-height:1.4}
.wx-msg.warn{color:var(--amber)}
.wx-msg.ok{color:var(--cyan)}
.wx-msg.neu{color:var(--tx2)}
.wx-temp{font-size:26px;font-weight:700;color:var(--tx);font-family:'JetBrains Mono',monospace;flex-shrink:0}
.wx-forecast{padding:8px 18px 10px;overflow-x:auto;display:flex;gap:6px}
.wx-forecast::-webkit-scrollbar{display:none}
.wx-day{flex-shrink:0;background:var(--s2);border:1px solid var(--bord);border-radius:var(--rs);padding:7px 9px;text-align:center;min-width:52px}
.wx-day.rain-day{border-color:var(--amber-dk);background:var(--amber-dim)}
.wx-day.today-day{border-color:var(--cyan);background:var(--cyan-dim)}
.wx-d-name{font-size:9px;color:var(--tx3);font-weight:700;text-transform:uppercase;margin-bottom:3px}
.wx-d-ico{font-size:16px;margin-bottom:3px}
.wx-d-temp{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--tx)}
.wx-d-prob{font-size:9px;color:var(--amber);font-family:'JetBrains Mono',monospace;margin-top:2px}

/* TABS */
.tabs{display:flex;background:var(--s1);border-bottom:1px solid var(--bord);padding:0 18px}
.tab{flex:1;text-align:center;padding:10px 4px 9px;font-size:12px;font-weight:600;color:var(--tx3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:0.4px;text-transform:uppercase;transition:all .15s}
.tab.on{color:var(--cyan);border-bottom-color:var(--cyan)}

/* CONTENT */
.content{padding:16px 18px;min-height:calc(100vh - 200px)}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--s2);border:1px solid var(--bord);border-radius:var(--r);padding:12px 14px}
.stat-num{font-size:26px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-lbl{font-size:10px;color:var(--tx3);margin-top:2px;text-transform:uppercase;letter-spacing:0.6px}
.c-pend .stat-num{color:var(--tx2)}
.c-curso .stat-num{color:var(--orange)}
.c-done .stat-num{color:var(--orange)}
.c-hoy .stat-num{color:var(--blue)}

/* KANBAN */
.kb-cols{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.kb-col{background:var(--s2);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden}
.kb-col.full{grid-column:1/-1}
.kb-head{padding:9px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bord)}
.kb-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px}
.kb-count{font-size:10px;font-family:'JetBrains Mono',monospace;background:var(--s3);color:var(--tx2);border-radius:20px;padding:2px 7px}
.col-pend .kb-label{color:var(--tx2)}
.col-curso .kb-label{color:var(--amber)}
.col-done .kb-label{color:var(--cyan)}
.kb-body{padding:8px}
.kb-empty{text-align:center;padding:18px 8px;color:var(--tx3);font-size:11px}

/* PRIORIDAD */
.prio-chip{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.prio-alta{background:var(--rose)}
.prio-media{background:var(--amber)}
.prio-baja{background:var(--tx3)}

/* JOB CARD */
.jcard{background:var(--s3);border:1px solid var(--bord2);border-radius:var(--rs);padding:10px 10px 10px 13px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;position:relative;overflow:hidden}
.jcard:last-child{margin-bottom:0}
.jcard:active{opacity:.8}
.jacc{position:absolute;left:0;top:0;bottom:0;width:3px}
.col-pend .jacc{background:var(--tx3)}
.col-curso .jacc{background:var(--amber)}
.col-done .jacc{background:var(--cyan)}
.jcard-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px}
.jname{font-size:12px;font-weight:600;color:var(--tx);line-height:1.3;flex:1}
.jbadges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px}
.jbadge{display:inline-block;font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600}
.b-pintura{background:#E8821A22;color:#E8821A}
.b-albanileria{background:#2B6CB822;color:#6FA3E0}
.b-arreglo{background:var(--green-dim);color:var(--green)}
.b-otro{background:#F5A62322;color:#F5A623}
.b-exterior{background:#2B6CB822;color:#6FA3E0}
.b-interior{background:#E8821A22;color:#E8821A}
.jmeta{font-size:10px;color:var(--tx3);line-height:1.8}
.jwflag{font-size:10px;margin-top:5px;padding:3px 7px;border-radius:4px;display:inline-block;font-weight:600}
.jwflag.warn{background:var(--amber-dim);color:var(--amber)}
.jwflag.ok{background:var(--cyan-dim);color:var(--cyan)}
.jgain{font-size:10px;margin-top:4px;font-family:'JetBrains Mono',monospace}
.jgain.pos{color:var(--cyan)}
.jgain.neg{color:var(--rose)}
.jgain.neu{color:var(--tx3)}

/* LIST VIEW */
.list-item{background:var(--s2);border:1px solid var(--bord);border-radius:var(--r);padding:13px 14px;margin-bottom:9px;cursor:pointer;display:flex;gap:12px;align-items:flex-start;transition:border-color .15s}
.list-item:active{opacity:.8}
.li-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:4px}
.li-body{flex:1;min-width:0}
.li-name{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:4px}
.li-meta{font-size:11px;color:var(--tx3);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.li-badge{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600}
.li-status{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:700;flex-shrink:0}
.ls-pend{background:var(--s3);color:var(--tx2)}
.ls-curso{background:var(--amber-dim);color:var(--amber)}
.ls-done{background:var(--cyan-dim);color:var(--cyan)}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{background:var(--s2);border:1px solid var(--bord);border-radius:var(--rs);width:32px;height:32px;color:var(--tx2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cal-month{font-size:15px;font-weight:700;color:var(--tx)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-dn{text-align:center;font-size:10px;color:var(--tx3);padding:4px 0;text-transform:uppercase;font-weight:600}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:6px;font-size:11px;color:var(--tx3);cursor:pointer;font-family:'JetBrains Mono',monospace;gap:2px;position:relative;transition:background .1s}
.cal-cell.other{opacity:.25}
.cal-cell.today{background:var(--s3);color:var(--tx);font-weight:700;border:1px solid var(--bord2)}
.cal-cell.rain-cal{background:var(--amber-dim)}
.cal-cell .dot-row{display:flex;gap:2px;position:absolute;bottom:3px}
.cal-dot{width:5px;height:5px;border-radius:50%}
.dot-pend{background:var(--tx3)}
.dot-curso{background:var(--amber)}
.dot-done{background:var(--cyan)}
.cal-event{background:var(--s2);border:1px solid var(--bord);border-radius:var(--rs);padding:10px 13px;margin-bottom:8px;display:flex;gap:10px;cursor:pointer;align-items:center;transition:border-color .15s}
.cal-event:active{opacity:.8}
.cal-edot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cal-ebody{flex:1;min-width:0}
.cal-ename{font-size:12px;font-weight:600;color:var(--tx)}
.cal-emeta{font-size:10px;color:var(--tx3);margin-top:2px}
.cal-estatus{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;flex-shrink:0}
.no-events{text-align:center;padding:30px;color:var(--tx3);font-size:12px}
.empty-state{text-align:center;padding:50px 20px}
.empty-ico{font-size:40px;margin-bottom:12px}
.empty-txt{color:var(--tx3);font-size:13px;line-height:1.6}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;overflow-y:auto;padding:20px 16px}
.modal-bg.open{display:flex;align-items:flex-start;justify-content:center}
.modal{background:var(--s1);border:1px solid var(--bord2);border-radius:var(--r);width:100%;max-width:440px;margin:auto;overflow:hidden}
.m-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 12px;border-bottom:1px solid var(--bord)}
.m-title{font-size:15px;font-weight:700;color:var(--tx)}
.m-close{background:var(--s3);border:none;color:var(--tx2);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.m-body{padding:16px 18px}
.fg{margin-bottom:12px;position:relative}
.flbl{display:block;font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:5px}
.fc{width:100%;background:var(--s2);border:1px solid var(--bord2);border-radius:var(--rs);padding:9px 11px;font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--tx);outline:none;transition:border .15s;-webkit-appearance:none;appearance:none}
.fc:focus{border-color:var(--cyan)}
.fc option{background:var(--s2);color:var(--tx)}
textarea.fc{resize:none;min-height:72px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.m-actions{display:flex;gap:8px;margin-top:14px}
.btn{flex:1;padding:11px;border-radius:var(--rs);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;letter-spacing:0.2px}
.btn:active{transform:scale(.97)}
.btn-pri{background:var(--cyan);color:#000}
.btn-sec{background:var(--s3);color:var(--tx2);border:1px solid var(--bord2)}
.btn-del{background:var(--rose-dim);color:var(--rose);border:1px solid var(--rose-dk)}
.btn-reprog{background:var(--blue-dim);color:var(--blue);border:1px solid #1d4ed844}

/* SECTION DIVIDER */
.m-section{font-size:10px;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:0.8px;margin:14px 0 10px;padding-top:10px;border-top:1px solid var(--bord)}

/* DETAIL */
.det-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.det-field{background:var(--s2);border-radius:var(--rs);padding:10px 12px}
.det-field.full{grid-column:1/-1}
.det-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.det-val{font-size:13px;color:var(--tx);font-weight:500;line-height:1.5}
.st-pills{display:flex;gap:6px}
.st-pill{flex:1;text-align:center;padding:8px 4px;border-radius:var(--rs);font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.st-pill.p{background:var(--s3);color:var(--tx3)}
.st-pill.a{background:var(--amber-dim);color:var(--amber)}
.st-pill.d{background:var(--cyan-dim);color:var(--cyan)}
.st-pill.sel{border-color:currentColor}
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.ph-thumb{aspect-ratio:1;border-radius:var(--rs);border:1px dashed var(--bord2);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--s2);overflow:hidden;font-size:20px;color:var(--tx3)}
.ph-thumb img{width:100%;height:100%;object-fit:cover}

/* FINANCES BOX */
.fin-box{background:var(--s2);border:1px solid var(--bord);border-radius:var(--r);padding:12px 14px;margin-bottom:12px}
.fin-title{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--bord)}
.fin-row:last-child{border-bottom:none}
.fin-lbl{font-size:11px;color:var(--tx2)}
.fin-val{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.fin-gain{font-size:15px;font-weight:700;font-family:'JetBrains Mono',monospace;margin-top:8px;padding-top:8px;border-top:1px solid var(--bord2);display:flex;justify-content:space-between;align-items:center}
.fin-gain .fin-lbl{font-size:12px}
.gain-pos{color:var(--cyan)}
.gain-neg{color:var(--rose)}
.gain-neu{color:var(--tx3)}

/* AUTOCOMPLETE */
.autocomplete-list{position:absolute;z-index:300;left:0;right:0;top:100%;background:var(--s2);border:1px solid var(--cyan);border-radius:var(--rs);max-height:160px;overflow-y:auto;margin-top:2px}
.autocomplete-item{padding:9px 11px;font-size:12px;cursor:pointer;color:var(--tx);border-bottom:1px solid var(--bord)}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover,.autocomplete-item:active{background:var(--s3)}

/* REPROGRAM BADGE */
.reprog-badge{background:var(--blue-dim);color:var(--blue);font-size:10px;padding:3px 8px;border-radius:4px;font-weight:600;margin-top:5px;display:inline-block}

/* NOTIFICATION PANEL */
.notif-panel{background:var(--s1);border-bottom:1px solid var(--bord);max-height:0;overflow:hidden;transition:max-height .3s ease}
.notif-panel.open{max-height:300px}
.notif-item{display:flex;gap:10px;align-items:flex-start;padding:10px 18px;border-bottom:1px solid var(--bord)}
.notif-item:last-child{border-bottom:none}
.notif-ico{font-size:16px;flex-shrink:0;margin-top:2px}
.notif-body{flex:1}
.notif-msg{font-size:12px;color:var(--tx);line-height:1.4}
.notif-time{font-size:10px;color:var(--tx3);margin-top:2px}
.notif-empty{padding:16px 18px;font-size:12px;color:var(--tx3);text-align:center}
.notif-header{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-bottom:1px solid var(--bord)}
.notif-header-lbl{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.6px}
.notif-clear{font-size:11px;color:var(--cyan);background:none;border:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600}

/* ALERT BANNER */
.alert-banner{margin:12px 18px 0;padding:10px 12px;border-radius:var(--rs);font-size:12px;line-height:1.5;display:flex;gap:8px;align-items:flex-start}
.alert-banner.warn{background:var(--amber-dim);border:1px solid var(--amber-dk);color:var(--amber)}
.alert-banner.info{background:var(--blue-dim);border:1px solid #1d4ed844;color:var(--blue)}
.alert-banner.ok{background:var(--cyan-dim);border:1px solid var(--cyan-dk);color:var(--cyan)}
.alert-ico{flex-shrink:0}
.alert-txt{flex:1}
.alert-btn{background:none;border:1px solid currentColor;border-radius:4px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;color:inherit;margin-top:5px;display:inline-block}

/* HISTORIAL DE CLIENTES */
.client-search-wrap{position:relative;margin-bottom:14px}
.client-list{display:flex;flex-direction:column;gap:9px}
.client-card{background:var(--s2);border:1px solid var(--bord);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s}
.client-card:active{opacity:.8}
.client-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.client-name{font-size:13px;font-weight:700;color:var(--tx)}
.client-stats{display:flex;gap:8px;align-items:center}
.client-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.cb-jobs{background:var(--s3);color:var(--tx2)}
.cb-money{background:var(--cyan-dim);color:var(--cyan);font-family:'JetBrains Mono',monospace}
.client-jobs{padding:0 14px 12px;display:none;border-top:1px solid var(--bord)}
.client-jobs.open{display:block}
.client-job-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--bord);cursor:pointer}
.client-job-row:last-child{border-bottom:none}
.cjr-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cjr-info{flex:1;min-width:0}
.cjr-name{font-size:11px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cjr-meta{font-size:10px;color:var(--tx3)}
.cjr-repeat{background:var(--violet-dim);color:var(--violet);border:none;border-radius:4px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;flex-shrink:0}
.cjr-open{color:var(--cyan);font-size:16px;flex-shrink:0;padding:0 2px}
.client-empty{text-align:center;padding:40px 20px;color:var(--tx3);font-size:12px}
.suggest-box{background:var(--violet-dim);border:1px solid var(--violet-dk, #4c1d95);border-radius:var(--rs);padding:10px 12px;margin-bottom:12px}
.suggest-title{font-size:10px;font-weight:700;color:var(--violet);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.suggest-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #8B5CF622}
.suggest-item:last-child{border-bottom:none}
.suggest-txt{flex:1;font-size:11px;color:var(--tx)}
.suggest-use{background:var(--violet);color:#fff;border:none;border-radius:4px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;flex-shrink:0}

/* PLANIFICACIÓN */
.plan-day-wrap{margin-bottom:14px}
.plan-day-head{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--s2);border:1px solid var(--bord);border-radius:var(--rs) var(--rs) 0 0}
.plan-day-name{font-size:12px;font-weight:700;color:var(--tx)}
.plan-day-date{font-size:10px;color:var(--tx3);font-family:'JetBrains Mono',monospace}
.plan-load{display:flex;align-items:center;gap:6px}
.plan-load-bar{flex:1;height:5px;background:var(--s3);border-radius:3px;overflow:hidden;min-width:60px}
.plan-load-fill{height:100%;border-radius:3px;transition:width .3s}
.load-ok{background:var(--cyan)}
.load-warn{background:var(--amber)}
.load-over{background:var(--rose)}
.plan-load-lbl{font-size:9px;font-family:'JetBrains Mono',monospace;font-weight:700}
.plan-blocks{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--bord);border-top:none;border-radius:0 0 var(--rs) var(--rs);overflow:hidden}
.plan-block{padding:9px 10px;background:var(--s1)}
.plan-block:first-child{border-right:1px solid var(--bord)}
.plan-block-lbl{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px}
.plan-job{background:var(--s2);border-left:3px solid var(--bord2);border-radius:0 4px 4px 0;padding:5px 8px;margin-bottom:5px;cursor:pointer;font-size:11px}
.plan-job:last-child{margin-bottom:0}
.plan-job:active{opacity:.8}
.plan-job-name{font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-job-meta{font-size:10px;color:var(--tx3);margin-top:1px}
.plan-empty{font-size:10px;color:var(--tx3);text-align:center;padding:10px 5px;font-style:italic}
.plan-add{width:100%;padding:5px;background:none;border:1px dashed var(--bord2);border-radius:4px;color:var(--tx3);font-size:10px;cursor:pointer;margin-top:5px;font-family:'Space Grotesk',sans-serif}
.plan-add:active{background:var(--s3)}
.plan-overload{background:var(--rose-dim);border:1px solid var(--rose-dk);border-radius:var(--rs);padding:7px 10px;font-size:11px;color:var(--rose);font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:9px}
.plan-week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.plan-week-lbl{font-size:13px;font-weight:700;color:var(--tx)}
.plan-nav-btn{background:var(--s2);border:1px solid var(--bord);border-radius:var(--rs);width:32px;height:32px;color:var(--tx2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* SUGERENCIA EN FORM */
.sug-pill-wrap{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.sug-pill{background:var(--s3);border:1px solid var(--bord2);border-radius:20px;padding:4px 10px;font-size:11px;color:var(--tx2);cursor:pointer;transition:all .15s}
.sug-pill:active{background:var(--cyan-dim);color:var(--cyan);border-color:var(--cyan)}
</style>

<script>
const DAYS=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const TLBL={pintura:'Pintura',albanileria:'Albañilería',arreglo:'Arreglo',otro:'Otro'};
const TBADGE={pintura:'b-pintura',albanileria:'b-albanileria',arreglo:'b-arreglo',otro:'b-otro'};
const ENVLBL={exterior:'Exterior',interior:'Interior'};
const ENVBADGE={exterior:'b-exterior',interior:'b-interior'};
const SLBL={pendiente:'Pendiente','en-curso':'En curso',terminado:'Terminado'};
const PRIOLBL={alta:'Alta',media:'Media',baja:'Baja'};
const PRIOCLS={alta:'prio-alta',media:'prio-media',baja:'prio-baja'};

const ST_DOT={pendiente:'#4A5568','en-curso':'#F59E0B',terminado:'#00D4AA'};
const ST_STATUS_CLS={pendiente:'ls-pend','en-curso':'ls-curso',terminado:'ls-done'};
const CAL_DOT={pendiente:'dot-pend','en-curso':'dot-curso',terminado:'dot-done'};
const CAL_BADGE={pendiente:'ls-pend','en-curso':'ls-curso',terminado:'ls-done'};

const STORAGE_KEY = 'om_v4_jobs';
const NOTIF_KEY = 'om_v4_notifs';
let jobs = [];
let tab = 'kanban';
let calM = new Date().getMonth(), calY = new Date().getFullYear();
let wxData = null; // {today, forecast[7]}
let notifications = [];
let acTimer = null;
let notifPanelOpen = false;

// ═══════════ PERSISTENCIA ═══════════
function loadJobs() {
  try { jobs = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { jobs = []; }
}
function saveJobs() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(jobs)); } catch(e) {}
}
function loadNotifs() {
  try { notifications = JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]'); } catch(e) { notifications = []; }
}
function saveNotifs() {
  try { localStorage.setItem(NOTIF_KEY, JSON.stringify(notifications)); } catch(e) {}
}
function addNotif(ico, msg) {
  notifications.unshift({ ico, msg, time: Date.now() });
  if(notifications.length > 30) notifications.pop();
  saveNotifs();
  renderNotifDot();
  renderNotifList();
}

function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(s) { if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }
function fmtShort(s) { if(!s) return '—'; const [y,m,d]=s.split('-'); return `${d}/${m}`; }
function fmtMoney(v) {
  if(v === '' || v === null || v === undefined || isNaN(Number(v))) return '—';
  return '$' + Number(v).toLocaleString('es-AR');
}
function fmtRelTime(ts) {
  const d = Date.now() - ts;
  if(d < 60000) return 'Ahora';
  if(d < 3600000) return Math.floor(d/60000) + ' min';
  if(d < 86400000) return Math.floor(d/3600000) + 'h';
  return Math.floor(d/86400000) + 'd';
}

function setDate() {
  const d = new Date();
  document.getElementById('hdr-date').textContent =
    `${DAYS[d.getDay()]} ${d.getDate()} de ${MONTHS[d.getMonth()]} de ${d.getFullYear()}`;
}

// ═══════════ NOTIFICACIONES PANEL ═══════════
function renderNotifDot() {
  const dot = document.getElementById('notif-dot');
  dot.classList.toggle('on', notifications.length > 0);
}
function renderNotifList() {
  const el = document.getElementById('notif-list');
  if(notifications.length === 0) {
    el.innerHTML = '<div class="notif-empty">Sin notificaciones</div>';
    return;
  }
  el.innerHTML = notifications.slice(0,10).map(n =>
    `<div class="notif-item">
      <span class="notif-ico">${n.ico}</span>
      <div class="notif-body">
        <div class="notif-msg">${n.msg}</div>
        <div class="notif-time">${fmtRelTime(n.time)}</div>
      </div>
    </div>`
  ).join('');
}
function clearNotifs() {
  notifications = []; saveNotifs();
  renderNotifDot(); renderNotifList();
}
function toggleNotif() {
  notifPanelOpen = !notifPanelOpen;
  document.getElementById('notif-panel').classList.toggle('open', notifPanelOpen);
  if(notifPanelOpen) renderNotifList();
}

// Notificaciones nativas del navegador
async function requestNotifPermission() {
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default') {
    await Notification.requestPermission();
  }
}
function sendNativeNotif(title, body) {
  if('Notification' in window && Notification.permission === 'granted') {
    new Notification(title, { body, icon: '🏗️' });
  }
}

// ═══════════ CLIMA ═══════════
async function loadWx() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=-38.0023&longitude=-57.5575' +
      '&current=temperature_2m,weathercode' +
      '&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max' +
      '&timezone=America/Argentina/Buenos_Aires&forecast_days=7';
    const r = await fetch(url);
    const d = await r.json();
    wxData = {
      today: {
        temp: Math.round(d.current.temperature_2m),
        code: d.current.weathercode,
        prob: d.daily.precipitation_probability_max[0]
      },
      forecast: d.daily.time.map((date, i) => ({
        date,
        code: d.daily.weathercode[i],
        max: Math.round(d.daily.temperature_2m_max[i]),
        min: Math.round(d.daily.temperature_2m_min[i]),
        prob: d.daily.precipitation_probability_max[i]
      }))
    };
    renderWx();
    renderAlerts();
    renderContent();
    checkWeatherNotifs();
  } catch(e) {
    document.getElementById('wx-content').innerHTML = '<span class="wx-msg neu">Sin datos de clima</span>';
  }
}

function wxIco(c) {
  if(c===0) return '☀️';
  if(c<=2) return '🌤️';
  if(c<=3) return '☁️';
  if(c<=48) return '🌫️';
  if(c<=67) return '🌧️';
  if(c<=77) return '❄️';
  if(c<=82) return '🌦️';
  if(c<=99) return '⛈️';
  return '🌡️';
}
function wxDesc(c) {
  if(c===0) return 'Despejado';
  if(c<=2) return 'Parcialmente nublado';
  if(c<=3) return 'Nublado';
  if(c<=48) return 'Niebla';
  if(c<=55) return 'Llovizna';
  if(c<=67) return 'Lluvia';
  if(c<=77) return 'Nieve';
  if(c<=82) return 'Lluvia intensa';
  if(c<=99) return 'Tormenta';
  return 'Variable';
}
function isRain(c, prob) { return (c >= 51 && c <= 99) || (prob != null && prob > 60); }
function isSun(c) { return c <= 2; }

function renderWx() {
  if(!wxData) return;
  const wx = wxData.today;
  let msg = '', cls = 'neu';
  if(isRain(wx.code, wx.prob)) { msg = `Lluvia prevista (${wx.prob}%) — evitar pintura y exteriores`; cls = 'warn'; }
  else if(isSun(wx.code)) { msg = 'Buen clima — ideal para exteriores y pintura'; cls = 'ok'; }
  else { msg = 'Condiciones moderadas — verificar antes de exteriores'; cls = 'neu'; }

  document.getElementById('wx-content').innerHTML =
    `<div class="wx-ico">${wxIco(wx.code)}</div>
     <div class="wx-info">
       <div class="wx-title">Mar del Plata — ${wxDesc(wx.code)}</div>
       <div class="wx-msg ${cls}">${msg}</div>
     </div>
     <div class="wx-temp">${wx.temp}°</div>`;

  // Pronóstico 7 días
  const fc = document.getElementById('wx-forecast');
  const td = today();
  fc.innerHTML = wxData.forecast.map((day, i) => {
    const isToday = day.date === td;
    const rain = isRain(day.code, day.prob);
    const cls2 = isToday ? 'today-day' : (rain ? 'rain-day' : '');
    const dayName = isToday ? 'Hoy' : DAYS[new Date(day.date + 'T12:00:00').getDay()];
    return `<div class="wx-day ${cls2}">
      <div class="wx-d-name">${dayName}</div>
      <div class="wx-d-ico">${wxIco(day.code)}</div>
      <div class="wx-d-temp">${day.max}°</div>
      ${rain ? `<div class="wx-d-prob">${day.prob}%</div>` : ''}
    </div>`;
  }).join('');
}

// ═══════════ ALERTAS INTELIGENTES ═══════════
function renderAlerts() {
  const area = document.getElementById('alert-area');
  if(!wxData) { area.innerHTML = ''; return; }

  const alerts = [];
  const td = today();

  // Trabajos exteriores hoy con lluvia
  const extHoy = jobs.filter(j =>
    j.date === td && j.env === 'exterior' && j.status !== 'terminado' &&
    isRain(wxData.today.code, wxData.today.prob)
  );
  if(extHoy.length > 0) {
    const names = extHoy.map(j => j.name).join(', ');
    const nextOk = findNextDryDay();
    alerts.push({
      cls: 'warn', ico: '⚠️',
      txt: `Lluvia hoy — ${extHoy.length} trabajo${extHoy.length>1?'s':''} exterior${extHoy.length>1?'es':''} en riesgo: <b>${escHtml(names)}</b>`,
      btn: nextOk ? `Reprogramar al ${fmtDate(nextOk)}` : null,
      action: nextOk ? `reprogAll('${nextOk}')` : null
    });
  }

  // Próximos días con lluvia que afectan trabajos
  wxData.forecast.slice(1, 7).forEach(day => {
    if(isRain(day.code, day.prob)) {
      const afect = jobs.filter(j =>
        j.date === day.date && j.env === 'exterior' && j.status !== 'terminado'
      );
      if(afect.length > 0) {
        const dn = DAYS[new Date(day.date + 'T12:00:00').getDay()];
        alerts.push({
          cls: 'info', ico: '🌧️',
          txt: `El <b>${dn} ${fmtShort(day.date)}</b> hay lluvia prevista (${day.prob}%) y tenés ${afect.length} trabajo${afect.length>1?'s':''} exterior${afect.length>1?'es':''} programado${afect.length>1?'s':''}.`,
          btn: null, action: null
        });
      }
    }
  });

  // Buen día
  if(!isRain(wxData.today.code, wxData.today.prob) && isSun(wxData.today.code)) {
    const extPend = jobs.filter(j => j.env === 'exterior' && j.status === 'pendiente');
    if(extPend.length > 0) {
      alerts.push({
        cls: 'ok', ico: '✅',
        txt: `Excelente día para avanzar con ${extPend.length} trabajo${extPend.length>1?'s':''} exterior${extPend.length>1?'es':''} pendiente${extPend.length>1?'s':''}.`,
        btn: null, action: null
      });
    }
  }

  area.innerHTML = alerts.map(a =>
    `<div class="alert-banner ${a.cls}">
      <span class="alert-ico">${a.ico}</span>
      <div class="alert-txt">
        ${a.txt}
        ${a.btn ? `<br><button class="alert-btn" onclick="${a.action}">${a.btn}</button>` : ''}
      </div>
    </div>`
  ).join('');
}

function findNextDryDay() {
  if(!wxData) return null;
  const td = today();
  for(const day of wxData.forecast) {
    if(day.date <= td) continue;
    if(!isRain(day.code, day.prob)) return day.date;
  }
  return null;
}

function reprogAll(newDate) {
  const td = today();
  const afect = jobs.filter(j =>
    j.date === td && j.env === 'exterior' && j.status !== 'terminado'
  );
  afect.forEach(j => { j.date = newDate; j.reprogrammed = true; });
  saveJobs();
  const dn = DAYS[new Date(newDate + 'T12:00:00').getDay()];
  addNotif('📅', `${afect.length} trabajo${afect.length>1?'s':''} reprogramado${afect.length>1?'s':''} al ${dn} ${fmtDate(newDate)}`);
  renderAlerts();
  renderContent();
}

function reprogOne(id) {
  const j = jobs.find(x => x.id === id);
  if(!j) return;
  const next = findNextDryDay();
  if(!next) { alert('No se encontró un día sin lluvia en el pronóstico disponible.'); return; }
  j.date = next;
  j.reprogrammed = true;
  saveJobs();
  const dn = DAYS[new Date(next + 'T12:00:00').getDay()];
  addNotif('📅', `"${j.name}" reprogramado al ${dn} ${fmtDate(next)}`);
  closeM('det-modal');
  renderAlerts();
  renderContent();
}

// Notificaciones de clima (se chequea al cargar)
const NOTIF_CHECK_KEY = 'om_v4_lastNotifCheck';
function checkWeatherNotifs() {
  const lastCheck = localStorage.getItem(NOTIF_CHECK_KEY);
  const td = today();
  if(lastCheck === td) return; // ya notificó hoy
  localStorage.setItem(NOTIF_CHECK_KEY, td);

  if(!wxData) return;
  const wx = wxData.today;
  if(isRain(wx.code, wx.prob)) {
    const extHoy = jobs.filter(j => j.date === td && j.env === 'exterior' && j.status !== 'terminado');
    if(extHoy.length > 0) {
      const msg = `Lluvia prevista hoy (${wx.prob}%). Tenés ${extHoy.length} trabajo exterior programado.`;
      addNotif('⚠️', msg);
      sendNativeNotif('ObraManager — Alerta de clima', msg);
    }
  }

  // Recordatorios de trabajos de hoy
  const todayJobs = jobs.filter(j => j.date === td && j.status === 'pendiente');
  todayJobs.forEach(j => {
    addNotif('📋', `Trabajo pendiente hoy: "${j.name}"`);
  });
}

// ═══════════ AUTOCOMPLETADO DE DIRECCIONES (Nominatim) ═══════════
function onLocInput(val) {
  clearTimeout(acTimer);
  if(val.length < 4) { hideAc(); return; }
  acTimer = setTimeout(() => searchAddress(val), 500);
}

async function searchAddress(q) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+', Mar del Plata')}&format=json&limit=5&addressdetails=0`;
    const r = await fetch(url, { headers: {'Accept-Language':'es'} });
    const data = await r.json();
    showAc(data.map(x => x.display_name.replace(/, Argentina$/, '').replace(/, Buenos Aires$/, '')));
  } catch(e) { hideAc(); }
}

function showAc(items) {
  const list = document.getElementById('ac-list');
  if(!items.length) { hideAc(); return; }
  list.style.display = 'block';
  list.innerHTML = items.map(i =>
    `<div class="autocomplete-item" onmousedown="pickAc(event,'${escAttr(i)}')">${escHtml(i)}</div>`
  ).join('');
}

function hideAc() {
  setTimeout(() => { document.getElementById('ac-list').style.display = 'none'; }, 150);
}

function pickAc(e, val) {
  e.preventDefault();

  hideAc();
}

function escAttr(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

// ═══════════ CÁLCULO DE GANANCIA ═══════════
function setupFinanceCalc() {
  ['fprice','fcost'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateGain);
  });
}
function updateGain() {
  const price = parseFloat(document.getElementById('fprice').value) || 0;
  const cost = parseFloat(document.getElementById('fcost').value) || 0;
  const gain = price - cost;
  const el = document.getElementById('fgain');
  if(price === 0 && cost === 0) { el.value = ''; el.style.color = 'var(--tx3)'; return; }
  el.value = gain >= 0 ? `+$${gain.toLocaleString('es-AR')}` : `-$${Math.abs(gain).toLocaleString('es-AR')}`;
  el.style.color = gain >= 0 ? 'var(--cyan)' : 'var(--rose)';
}

// ═══════════ WEATHER FLAG por trabajo ═══════════
function wxFlag(j) {
  if(!wxData || j.status === 'terminado') return '';
  if(!j.date) return '';
  const day = wxData.forecast.find(f => f.date === j.date);
  if(!day) return '';
  if(j.env !== 'exterior') return '';
  if(isRain(day.code, day.prob)) return `<span class="jwflag warn">⚠ Lluvia — reprogramar</span>`;
  if(day.date === today() && isSun(day.code)) return `<span class="jwflag ok">✓ Buen día</span>`;
  return '';
}

// ═══════════ GAIN DISPLAY ═══════════
function gainHtml(j) {
  if(!j.price && !j.cost) return '';
  const price = Number(j.price)||0, cost = Number(j.cost)||0;
  const gain = price - cost;
  const cls = gain > 0 ? 'pos' : gain < 0 ? 'neg' : 'neu';
  const sign = gain >= 0 ? '+' : '';
  return `<div class="jgain ${cls}">💰 ${sign}${fmtMoney(gain)}</div>`;
}

function renderKanban() {
  if(jobs.length === 0) {
    document.getElementById('content').innerHTML = statsHtml() +
      `<div class="empty-state"><div class="empty-ico">🏗️</div><div class="empty-txt">No hay trabajos cargados.<br>Tocá "+ Nuevo" para empezar.</div></div>`;
    return;
  }
  // Ordenar por prioridad dentro de cada columna
  const prioOrd = {alta:0, media:1, baja:2};
  const sorted = [...jobs].sort((a,b) => (prioOrd[a.priority||'media']||1) - (prioOrd[b.priority||'media']||1));

  const cols = [
    {key:'pendiente', cls:'col-pend', lbl:'Pendientes'},
    {key:'en-curso',  cls:'col-curso', lbl:'En curso'},
    {key:'terminado', cls:'col-done',  lbl:'Terminados'},
  ];
  let html = statsHtml() + '<div class="kb-cols">';
  cols.forEach((c, i) => {
    const items = sorted.filter(j => j.status === c.key);
    const full = i === 2 ? 'full' : '';
    html += `<div class="kb-col ${c.cls} ${full}">
      <div class="kb-head"><span class="kb-label">${c.lbl}</span><span class="kb-count">${items.length}</span></div>
      <div class="kb-body">`;
    if(items.length === 0) html += `<div class="kb-empty">Sin trabajos</div>`;
    else items.forEach(j => { html += jcardHtml(j); });
    html += '</div></div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

// ═══════════ CALENDARIO ═══════════
function renderCal() {
  const td = today();
  const first = new Date(calY, calM, 1);
  const last = new Date(calY, calM+1, 0);
  const startDay = first.getDay();

  // Mapa de días con lluvia del forecast
  const rainDays = new Set();
  if(wxData) {
    wxData.forecast.forEach(f => { if(isRain(f.code, f.prob)) rainDays.add(f.date); });
  }

  let cells = '';
  DAYS.forEach(d => { cells += `<div class="cal-dn">${d[0]}</div>`; });

  for(let i = 0; i < startDay; i++) {
    const pm = new Date(calY, calM, 0 - startDay + i + 2);
    cells += `<div class="cal-cell other">${pm.getDate()}</div>`;
  }
  for(let d = 1; d <= last.getDate(); d++) {
    const key = `${calY}-${String(calM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayJobs = jobs.filter(j => j.date === key);
    const isToday = key === td;
    const rain = rainDays.has(key);
    let dots = '';
    if(dayJobs.length > 0) {
      const shown = dayJobs.slice(0, 3);
      dots = `<div class="dot-row">${shown.map(j => `<div class="cal-dot ${CAL_DOT[j.status]}"></div>`).join('')}</div>`;
    }
    cells += `<div class="cal-cell${isToday?' today':''}${rain?' rain-cal':''}" onclick="calDay('${key}')">${d}${dots}</div>`;
  }
  const after = (startDay + last.getDate()) % 7;
  if(after > 0) for(let d = 1; d <= 7-after; d++) cells += `<div class="cal-cell other">${d}</div>`;

  const mJobs = jobs
    .filter(j => j.date && j.date.startsWith(`${calY}-${String(calM+1).padStart(2,'0')}`))
    .sort((a,b) => (a.date||'') > (b.date||'') ? 1 : -1);

  let events = '';
  if(mJobs.length === 0) {
    events = `<div class="no-events">Sin trabajos este mes</div>`;
  } else {
    mJobs.forEach(j => {
      const rain = rainDays.has(j.date) && j.env === 'exterior';
      events += `<div class="cal-event${rain?' rain-cal':''}" onclick="openDet('${j.id}')">
        <div class="cal-edot" style="background:${ST_DOT[j.status]}"></div>
        <div class="cal-ebody">
          <div class="cal-ename">${escHtml(j.name)}</div>
          <div class="cal-emeta">${fmtShort(j.date)} · ${TLBL[j.type||'otro']} · ${ENVLBL[j.env||'interior']}${rain ? ' ⚠️' : ''}</div>
        </div>
        <div class="cal-estatus ${CAL_BADGE[j.status]}">${SLBL[j.status]}</div>
      </div>`;
    });
  }

  document.getElementById('content').innerHTML = `
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="chM(-1)">&#8592;</button>
      <span class="cal-month">${MONTHS[calM]} ${calY}</span>
      <button class="cal-nav-btn" onclick="chM(1)">&#8594;</button>
    </div>
    <div class="cal-grid">${cells}</div>
    ${events}`;
}

function chM(dir) {
  calM += dir;
  if(calM < 0) { calM = 11; calY--; }
  if(calM > 11) { calM = 0; calY++; }
  renderCal();
}
function calDay(key) {
  const dayJobs = jobs.filter(j => j.date === key);
  if(dayJobs.length === 1) openDet(dayJobs[0].id);
}

  document.getElementById('fblock').value = '';

function saveJob() {
  const name = document.getElementById('fn').value.trim();
  if(!name) { document.getElementById('fn').focus(); return; }
  const id = document.getElementById('eid').value || Date.now().toString();
  const existing = jobs.find(j => j.id === id);
  const job = {
    id, name,
    type: document.getElementById('ft').value,
    env: document.getElementById('fenv').value,
    status: document.getElementById('fs').value,
    priority: document.getElementById('fprio').value,
    location: document.getElementById('fl').value.trim(),
    date: document.getElementById('fd').value,
    block: document.getElementById('fblock').value,
    price: document.getElementById('fprice').value,
    cost: document.getElementById('fcost').value,
    notes: document.getElementById('fno').value.trim(),
    photos: existing ? existing.photos : [],
    reprogrammed: existing ? existing.reprogrammed : false,
    createdAt: existing ? existing.createdAt : Date.now()
  };
  const idx = jobs.findIndex(j => j.id === id);
  if(idx >= 0) jobs[idx] = job;
  else jobs.unshift(job);
  saveJobs();
  closeM('add-modal');
  renderAlerts();
  renderContent();
}

    <div class="fin-box">
      <div class="fin-title">Finanzas</div>

  const canReprog = j.env === 'exterior' && j.status !== 'terminado' &&

  const reprogBtn = canReprog ? `<button class="btn btn-reprog" onclick="reprogOne('${id}')">📅 Reprogramar</button>` : '';

          <span class="jbadge ${TBADGE[j.type||'otro']}">${TLBL[j.type||'otro']}</span>
        </div>
      </div>
      <div class="det-field">
        <div class="det-lbl">Entorno</div>
        <div class="det-val">
          <span class="jbadge ${ENVBADGE[j.env||'interior']}">${ENVLBL[j.env||'interior']}</span>
        </div>
      </div>
      <div class="det-field">
        <div class="det-lbl">Fecha</div>
        <div class="det-val">${fmtDate(j.date)}</div>
      </div>
      <div class="det-field">
        <div class="det-lbl">Prioridad</div>
        <div class="det-val">
          <span class="prio-chip ${PRIOCLS[j.priority||'media']}" style="margin-right:5px;vertical-align:middle;display:inline-block"></span>${PRIOLBL[j.priority||'media']}
        </div>
      </div>

        <div class="det-val">${j.block === 'manana' ? '🌅 Mañana' : '🌇 Tarde'}</div>
      </div>` : ''}
      <div class="det-field full"><div class="det-lbl">Ubicación</div><div class="det-val">${escHtml(j.location||'—')}</div></div>
      ${j.notes ? `<div class="det-field full"><div class="det-lbl">Notas</div><div class="det-val" style="font-size:12px;color:var(--tx2);line-height:1.6">${escHtml(j.notes)}</div></div>` : ''}
    </div>
    ${finHtml}

function updSt(id, st, el) {
  const j = jobs.find(x => x.id === id);
  if(!j) return;
  j.status = st;
  saveJobs();
  el.closest('.st-pills').querySelectorAll('.st-pill').forEach(p => p.classList.remove('sel'));
  el.classList.add('sel');
  renderContent();
}

function editJ(id) {
  const j = jobs.find(x => x.id === id);
  if(!j) return;
  closeM('det-modal');
  document.getElementById('m-title').textContent = 'Editar trabajo';
  document.getElementById('eid').value = j.id;
  document.getElementById('fn').value = j.name;
  document.getElementById('ft').value = j.type || 'otro';
  document.getElementById('fenv').value = j.env || 'interior';
  document.getElementById('fs').value = j.status;
  document.getElementById('fprio').value = j.priority || 'media';
  document.getElementById('fl').value = j.location || '';
  document.getElementById('fd').value = j.date || '';
  document.getElementById('fprice').value = j.price || '';
  document.getElementById('fcost').value = j.cost || '';
  document.getElementById('fno').value = j.notes || '';
  document.getElementById('fblock').value = j.block || '';
  updateGain();
  document.getElementById('add-modal').classList.add('open');
}

function delJ(id) {
  if(!confirm('¿Eliminar este trabajo?')) return;
  jobs = jobs.filter(j => j.id !== id);
  saveJobs();
  closeM('det-modal');
  renderAlerts();
  renderContent();
}

function addPh(id) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.capture = 'environment';
  inp.onchange = e => {
    const f = e.target.files[0]; if(!f) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const j = jobs.find(x => x.id === id); if(!j) return;
      if(!j.photos) j.photos = [];
      j.photos.push(ev.target.result);
      saveJobs();
      openDet(id);
    };
    reader.readAsDataURL(f);
  };
  inp.click();
}

function closeM(id) { document.getElementById(id).classList.remove('open'); }
function bgClose(e, id) { if(e.target === e.currentTarget) closeM(id); }

function escHtml(str) {
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════ SUGERENCIAS EN FORMULARIO ═══════════
function showFormSuggestions() {
  const done = jobs.filter(j => j.status === 'terminado');
  if(done.length === 0) return;
  // Agrupar por cliente (primeras palabras del nombre)
  const recent = done.slice(0, 8);
  const pills = document.getElementById('sug-pills');
  pills.innerHTML = recent.map(j =>
    `<div class="sug-pill" onclick="fillFromSuggestion('${j.id}')" title="${escHtml(j.name)}">${escHtml(j.name.length > 28 ? j.name.slice(0,28)+'…' : j.name)}</div>`
  ).join('');
  document.getElementById('sug-wrap').style.display = 'block';
}

function fillFromSuggestion(id) {
  const j = jobs.find(x => x.id === id);
  if(!j) return;
  document.getElementById('fn').value = j.name;
  document.getElementById('ft').value = j.type || 'otro';
  document.getElementById('fenv').value = j.env || 'interior';
  document.getElementById('fl').value = j.location || '';
  document.getElementById('fprice').value = j.price || '';
  document.getElementById('fcost').value = j.cost || '';
  document.getElementById('fno').value = j.notes || '';
  document.getElementById('fblock').value = j.block || '';
  document.getElementById('fs').value = 'pendiente';
  document.getElementById('fd').value = today();
  document.getElementById('eid').value = ''; // nuevo trabajo
  updateGain();
}

// ═══════════ HISTORIAL POR CLIENTE ═══════════
let openClientName = null;

function extractClient(name) {
  // Intenta extraer el cliente: todo antes del guión largo o los primeros 2 palabras
  const m = name.match(/^(.+?)[\s—\-–]+/);
  if(m) return m[1].trim();
  const words = name.trim().split(/\s+/);
  return words.slice(0, 2).join(' ');
}

function groupByClient() {
  const map = {};
  jobs.forEach(j => {
    const cl = extractClient(j.name);
    if(!map[cl]) map[cl] = [];
    map[cl].push(j);
  });
  return map;
}

function renderClientes() {
  const map = groupByClient();
  const keys = Object.keys(map).sort();
  const searchVal = (document.getElementById('client-search') || {}).value || '';
  const filtered = searchVal
    ? keys.filter(k => k.toLowerCase().includes(searchVal.toLowerCase()))
    : keys;

  if(filtered.length === 0) {
    document.getElementById('content').innerHTML =
      `<div class="client-empty"><div style="font-size:36px;margin-bottom:10px">👥</div>No hay clientes aún.<br>Los clientes aparecen automáticamente<br>cuando agregás trabajos.</div>`;
    return;
  }

  // Sugerencias automáticas: clientes terminados hace >30 días sin trabajos recientes
  const td = today();
  const suggestions = [];
  keys.forEach(cl => {
    const cjobs = map[cl];
    const lastDone = cjobs.filter(j => j.status === 'terminado').sort((a,b) => b.date > a.date ? 1 : -1)[0];
    const hasPending = cjobs.some(j => j.status !== 'terminado');
    if(lastDone && !hasPending) {
      const daysSince = Math.floor((new Date(td) - new Date(lastDone.date)) / 86400000);
      if(daysSince > 30) suggestions.push({ cl, lastDone, daysSince });
    }
  });

  let html = '';
  if(suggestions.length > 0) {
    html += `<div class="suggest-box">
      <div class="suggest-title">🔁 Podría repetirse</div>
      ${suggestions.slice(0,3).map(s =>
        `<div class="suggest-item">
          <div class="suggest-txt">${escHtml(s.cl)} <span style="color:var(--tx3)">— ${s.daysSince}d desde último trabajo</span></div>
          <button class="suggest-use" onclick="repeatClient('${escAttr(s.cl)}')">Repetir</button>
        </div>`
      ).join('')}
    </div>`;
  }

  html += `<div class="client-search-wrap">
    <input class="fc" id="client-search" placeholder="🔍 Buscar cliente..." oninput="renderClientes()" value="${escHtml(searchVal)}">
  </div>
  <div class="client-list">`;

  filtered.forEach(cl => {
    const cjobs = map[cl];
    const totalGain = cjobs.reduce((s,j) => s + (Number(j.price)||0) - (Number(j.cost)||0), 0);
    const isOpen = openClientName === cl;
    html += `<div class="client-card">
      <div class="client-head" onclick="toggleClient('${escAttr(cl)}')">
        <div>
          <div class="client-name">${escHtml(cl)}</div>
          <div style="font-size:10px;color:var(--tx3);margin-top:2px">${cjobs.length} trabajo${cjobs.length!==1?'s':''}</div>
        </div>
        <div class="client-stats">
          ${totalGain !== 0 ? `<span class="client-badge cb-money">${totalGain>=0?'+':''}${fmtMoney(totalGain)}</span>` : ''}
          <span style="color:var(--tx3);font-size:14px">${isOpen?'▲':'▼'}</span>
        </div>
      </div>
      <div class="client-jobs ${isOpen?'open':''}">
        ${cjobs.sort((a,b) => b.date > a.date ? 1 : -1).map(j => `
          <div class="client-job-row" onclick="openDet('${j.id}')">
            <div class="cjr-dot" style="background:${ST_DOT[j.status]}"></div>
            <div class="cjr-info">
              <div class="cjr-name">${escHtml(j.name)}</div>
              <div class="cjr-meta">${fmtDate(j.date)} · ${TLBL[j.type||'otro']} · ${SLBL[j.status]}</div>
            </div>
            <button class="cjr-repeat" onclick="event.stopPropagation();repeatJob('${j.id}')">🔁 Repetir</button>
          </div>`).join('')}
        <div style="margin-top:10px">
          <button class="plan-add" onclick="newForClient('${escAttr(cl)}')">+ Nuevo trabajo para ${escHtml(cl)}</button>
        </div>
      </div>
    </div>`;
  });

  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function toggleClient(cl) {
  openClientName = openClientName === cl ? null : cl;
  renderClientes();
}

function repeatJob(id) {
  const j = jobs.find(x => x.id === id);
  if(!j) return;
  closeM('det-modal');
  document.getElementById('m-title').textContent = 'Repetir trabajo';
  document.getElementById('eid').value = '';
  document.getElementById('fn').value = j.name;
  document.getElementById('ft').value = j.type || 'otro';
  document.getElementById('fenv').value = j.env || 'interior';
  document.getElementById('fs').value = 'pendiente';
  document.getElementById('fprio').value = j.priority || 'media';
  document.getElementById('fl').value = j.location || '';
  document.getElementById('fd').value = today();
  document.getElementById('fblock').value = j.block || '';
  document.getElementById('fprice').value = j.price || '';
  document.getElementById('fcost').value = j.cost || '';
  document.getElementById('fno').value = j.notes || '';
  updateGain();
  document.getElementById('sug-wrap').style.display = 'none';
  document.getElementById('add-modal').classList.add('open');
}

function repeatClient(cl) {
  const map = groupByClient();
  const cjobs = map[cl] || [];
  const last = cjobs.sort((a,b) => b.date > a.date ? 1 : -1)[0];
  if(last) repeatJob(last.id);
}

function newForClient(cl) {
  openAdd();
  document.getElementById('fn').value = cl + ' — ';
  document.getElementById('fn').focus();
}

// ═══════════ VISTA DE PLANIFICACIÓN ═══════════
let planWeekOffset = 0;

function getWeekDays(offset) {
  const days = [];
  const now = new Date();
  const monday = new Date(now);
  const dow = now.getDay() === 0 ? 6 : now.getDay() - 1;
  monday.setDate(now.getDate() - dow + offset * 7);
  for(let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    days.push(d.toISOString().slice(0,10));
  }
  return days;
}

function renderPlan() {
  const weekDays = getWeekDays(planWeekOffset);
  const td = today();
  const rainDays = new Set();
  if(wxData) wxData.forecast.forEach(f => { if(isRain(f.code, f.prob)) rainDays.add(f.date); });

  const startDate = weekDays[0];
  const endDate = weekDays[6];
  const fmt = (s) => { const [y,m,d]=s.split('-'); return `${d}/${m}`; };
  const weekLbl = planWeekOffset === 0 ? 'Esta semana' :
    planWeekOffset === 1 ? 'Próxima semana' :
    planWeekOffset === -1 ? 'Semana pasada' :
    `${fmt(startDate)} – ${fmt(endDate)}`;

  // Calcular carga total de la semana
  const weekJobs = jobs.filter(j => j.date >= startDate && j.date <= endDate && j.status !== 'terminado');
  const overloadDays = weekDays.filter(day => jobs.filter(j => j.date === day && j.status !== 'terminado').length >= 3);

  let html = `<div class="plan-week-nav">
    <button class="plan-nav-btn" onclick="planWeekOffset--;renderContent()">&#8592;</button>
    <div>
      <div class="plan-week-lbl">${weekLbl}</div>
      <div style="font-size:10px;color:var(--tx3);margin-top:2px">${weekJobs.length} trabajo${weekJobs.length!==1?'s':''} activos</div>
    </div>
    <button class="plan-nav-btn" onclick="planWeekOffset++;renderContent()">&#8594;</button>
  </div>`;

  if(overloadDays.length > 0) {
    html += `<div class="plan-overload">⚠️ Días con sobrecarga (3+ trabajos): ${overloadDays.map(d => {
      const [y,m,dd]=d.split('-'); return `${dd}/${m}`;}).join(', ')}</div>`;
  }

  weekDays.forEach(day => {
    const dayJobs = jobs.filter(j => j.date === day);
    const activeJobs = dayJobs.filter(j => j.status !== 'terminado');
    const d = new Date(day + 'T12:00:00');
    const dayName = day === td ? 'Hoy' : DAYS[d.getDay()];
    const dayNum = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
    const loadCount = activeJobs.length;
    const loadPct = Math.min(100, (loadCount / 3) * 100);
    const loadCls = loadCount >= 3 ? 'load-over' : loadCount >= 2 ? 'load-warn' : 'load-ok';
    const loadColor = loadCount >= 3 ? 'var(--rose)' : loadCount >= 2 ? 'var(--amber)' : 'var(--cyan)';
    const rain = rainDays.has(day);

    const mañana = dayJobs.filter(j => j.block === 'manana');
    const tarde   = dayJobs.filter(j => j.block === 'tarde');
    const sinBloque = dayJobs.filter(j => !j.block);

    const jobCard = (j) =>
      `<div class="plan-job" style="border-left-color:${ST_DOT[j.status]}" onclick="openDet('${j.id}')">
        <div class="plan-job-name">${escHtml(j.name.length > 22 ? j.name.slice(0,22)+'…' : j.name)}</div>
        <div class="plan-job-meta">${TLBL[j.type||'otro']} · ${SLBL[j.status]}${rain && j.env==='exterior' ? ' ⚠️' : ''}</div>
      </div>`;

    html += `<div class="plan-day-wrap">
      <div class="plan-day-head">
        <div>
          <div class="plan-day-name">${dayName}${day === td ? ' 📍' : ''}</div>
          <div class="plan-day-date">${dayNum}${rain ? ' 🌧' : ''}</div>
        </div>
        <div class="plan-load" style="min-width:90px">
          <div class="plan-load-bar"><div class="plan-load-fill ${loadCls}" style="width:${loadPct}%"></div></div>
          <div class="plan-load-lbl" style="color:${loadColor}">${loadCount}/3</div>
        </div>
      </div>
      <div class="plan-blocks">
        <div class="plan-block">
          <div class="plan-block-lbl">🌅 Mañana</div>
          ${mañana.length ? mañana.map(jobCard).join('') : ''}
          ${sinBloque.length && mañana.length === 0 && tarde.length === 0 ? sinBloque.map(jobCard).join('') : ''}
          ${mañana.length === 0 && !(sinBloque.length && tarde.length === 0) ? '<div class="plan-empty">Libre</div>' : ''}
          <button class="plan-add" onclick="addForDay('${day}','manana')">+ Agregar</button>
        </div>
        <div class="plan-block">
          <div class="plan-block-lbl">🌇 Tarde</div>
          ${tarde.length ? tarde.map(jobCard).join('') : '<div class="plan-empty">Libre</div>'}
          <button class="plan-add" onclick="addForDay('${day}','tarde')">+ Agregar</button>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function addForDay(date, block) {
  openAdd();
  document.getElementById('fd').value = date;
  document.getElementById('fblock').value = block;
}

// ═══════════ INIT ═══════════
loadJobs();
loadNotifs();
setDate();
loadWx();
renderContent();
renderNotifDot();
setupFinanceCalc();

// Recargar clima cada 30 min
setInterval(loadWx, 30 * 60 * 1000);
</script>
